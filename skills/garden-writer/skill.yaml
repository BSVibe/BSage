name: garden-writer
version: 1.0.0
author: bslab
category: process
is_dangerous: false
description: Formats input data into structured Obsidian markdown notes
entrypoint: skill.py::execute
trigger:
  type: on_input
input_schema:
  type: object
  properties:
    items:
      type: array
      description: List of notes to write
      items:
        type: object
        properties:
          title:
            type: string
            description: Note title
          content:
            type: string
            description: Note body in markdown
          tags:
            type: array
            items:
              type: string
            description: Optional tags for the note
        required:
          - title
          - content
  required:
    - items
