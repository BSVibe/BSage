services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Seoul}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: vscode
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      - ~/.claude:/home/vscode/.claude:cached
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=development
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    stdin_open: true
    tty: true
    command: >
      sh -c "zsh && sudo /usr/local/bin/init-firewall.sh"
    ports:
      - "${EXTERNAL_FRONTEND_PORT:-5173}:5173"
      - "${EXTERNAL_BACKEND_PORT:-8000}:8000"
    networks:
      - bsage-network

volumes:
  claude-code-bashhistory:

networks:
  bsage-network:
    driver: bridge
